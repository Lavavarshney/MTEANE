version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: triggrr-postgres
    environment:
      POSTGRES_USER: triggrr
      POSTGRES_PASSWORD: triggrr
      POSTGRES_DB: triggrr
    ports:
      - "5432:5432"
    volumes:
      - triggrr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triggrr -d triggrr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triggrr-network

  redis:
    image: redis:7-alpine
    container_name: triggrr-redis
    ports:
      - "6379:6379"
    volumes:
      - triggrr-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triggrr-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: triggrr-app
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://triggrr:triggrr@postgres:5432/triggrr
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - triggrr-network
    command: npm run dev

volumes:
  triggrr-postgres-data:
  triggrr-redis-data:

networks:
  triggrr-network:
    driver: bridge
