version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: triggrr-postgres
    environment:
      POSTGRES_USER: triggrr
      POSTGRES_PASSWORD: triggrr
      POSTGRES_DB: triggrr
    ports:
      - "5432:5432"
    volumes:
      - triggrr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triggrr -d triggrr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triggrr-network

  redis:
    image: redis:7-alpine
    container_name: triggrr-redis
    ports:
      - "6379:6379"
    volumes:
      - triggrr-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triggrr-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: triggrr-api
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://triggrr:triggrr@postgres:5432/triggrr
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - triggrr-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: triggrr-worker
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://triggrr:triggrr@postgres:5432/triggrr
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - triggrr-network

volumes:
  triggrr-postgres-data:
  triggrr-redis-data:

networks:
  triggrr-network:
    driver: bridge
